<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TXYZ — Scalp</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="./lightweight-charts.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090c;--s1:#0c1017;--s2:#101520;--border:#1a2535;
  --accent:#00d4ff;--text:#c8d8e8;--muted:#4a6a84;
  --bull:#00e676;--bear:#ff3d57;--gold:#f0b429;--purple:#a78bfa;
  --mono:'Space Mono',monospace;--display:'Syne',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:clamp(11px,.9vw,15px);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.02) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;width:100%;padding:0 clamp(10px,1.2vw,20px) 16px}

/* TICKER */
.ticker-wrap{background:#000;border-bottom:2px solid #003300;overflow:hidden;height:clamp(36px,3vw,50px);display:flex;align-items:center;width:100%;position:relative;box-shadow:0 2px 16px rgba(0,230,118,.12) inset}
.ticker-track{display:flex;white-space:nowrap;will-change:transform}
.tick-item{display:inline-flex;align-items:center;gap:clamp(6px,.8vw,12px);padding:0 clamp(14px,1.5vw,24px);height:clamp(36px,3vw,50px);border-right:1px solid #001800;flex-shrink:0}
.tick-sym{color:#00ff41;font-weight:700;font-size:clamp(.7rem,.85vw,.95rem);letter-spacing:.12em;text-shadow:0 0 8px #00ff41,0 0 16px rgba(0,255,65,.3);font-family:var(--mono)}
.tick-price{color:#ccffcc;font-size:clamp(.68rem,.82vw,.92rem);font-family:var(--mono);text-shadow:0 0 4px rgba(180,255,180,.4)}
.tick-chg{font-size:clamp(.6rem,.72vw,.82rem);font-family:var(--mono);font-weight:700}
.tick-chg.up{color:#00ff41;text-shadow:0 0 6px #00ff41}.tick-chg.down{color:#ff2244;text-shadow:0 0 6px #ff2244}
.tick-sep{color:#002200;padding:0 5px}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:clamp(8px,.8vw,12px) 0;margin-bottom:clamp(8px,.8vw,12px)}
.hrow{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.logo{font-family:var(--display);font-weight:800;font-size:clamp(1rem,1.6vw,1.8rem);color:#fff;letter-spacing:-.02em}
.logo em{color:var(--accent);font-style:normal}
.hright{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:5px;font-size:clamp(.44rem,.52vw,.6rem);letter-spacing:.1em;color:var(--muted);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
.dot{width:5px;height:5px;border-radius:50%}
.dot.live{background:var(--bull);animation:pulse 2s infinite}
.dot.off{background:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* CONFIG */
.cfg{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;padding:8px 12px;background:var(--s1);border:1px solid var(--border);border-radius:3px;margin-bottom:10px}
.cfg-g{display:flex;flex-direction:column;gap:3px}
.cfg-g label{font-size:clamp(.42rem,.5vw,.56rem);letter-spacing:.1em;color:var(--muted)}
input[type=password]{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:clamp(.62rem,.72vw,.78rem);padding:5px 8px;border-radius:3px;outline:none;transition:border-color .15s;width:clamp(130px,12vw,170px)}
input:focus{border-color:var(--accent)}
select{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:clamp(.62rem,.72vw,.78rem);padding:5px 8px;border-radius:3px;outline:none;cursor:pointer}
.btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:clamp(.5rem,.58vw,.64rem);letter-spacing:.08em;padding:5px 11px;cursor:pointer;border-radius:3px;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.go{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.btn.go:hover{background:#00bcd4}
.btn.stop{border-color:var(--bear);color:var(--bear)}

/* LAYOUT */
.main-layout{display:grid;grid-template-columns:1fr clamp(280px,20vw,400px);gap:clamp(8px,.8vw,14px);align-items:start}
@media(max-width:1000px){.main-layout{grid-template-columns:1fr}}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.chart-wide{grid-column:1/-1}
.cpanel{background:var(--s1);border:1px solid var(--border);border-radius:3px;overflow:hidden;display:flex;flex-direction:column}
.chdr{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.tf-tag{font-size:clamp(.46rem,.54vw,.6rem);letter-spacing:.1em;font-weight:700}
.tf-M15{color:var(--bull)}.tf-M5{color:var(--accent)}.tf-M1{color:var(--purple)}
.role{font-size:clamp(.38rem,.44vw,.5rem);letter-spacing:.06em;padding:1px 6px;border-radius:2px;border:1px solid;margin-left:5px}
.role-draw{border-color:rgba(0,230,118,.3);color:rgba(0,230,118,.7)}
.role-bos{border-color:rgba(0,212,255,.3);color:rgba(0,212,255,.7)}
.role-entry{border-color:rgba(167,139,250,.3);color:rgba(167,139,250,.7)}
.price-info{font-size:clamp(.46rem,.54vw,.6rem);color:var(--muted)}
.price-info span{color:var(--text)}
.live-tag{font-size:clamp(.34rem,.4vw,.46rem);color:var(--bull);margin-left:5px;animation:pulse 2s infinite}
.chart-body{flex:1;min-height:0}

/* RIGHT PANEL */
.apanel{display:flex;flex-direction:column;gap:8px;position:sticky;top:8px;max-height:calc(100vh - 100px);overflow-y:auto}
.apanel::-webkit-scrollbar{width:3px}
.apanel::-webkit-scrollbar-thumb{background:var(--border)}
.panel{background:var(--s1);border:1px solid var(--border);border-radius:3px;overflow:hidden;flex-shrink:0}
.phdr{padding:6px 12px;border-bottom:1px solid var(--border);font-size:clamp(.44rem,.52vw,.58rem);letter-spacing:.12em;color:var(--muted);display:flex;align-items:center;justify-content:space-between}

/* TRADE BOX */
.trade-box{margin:8px 12px 10px;border:1px solid var(--border);border-radius:3px;overflow:hidden;transition:border-color .3s}
.trade-box.bull{border-color:rgba(0,230,118,.5)}.trade-box.bear{border-color:rgba(255,61,87,.5)}
.trade-box-hdr{padding:5px 10px;font-size:clamp(.42rem,.5vw,.56rem);letter-spacing:.1em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--s2);display:flex;align-items:center;gap:8px}
.dir-badge{font-size:clamp(.5rem,.58vw,.64rem);font-weight:700;padding:2px 10px;border-radius:2px;letter-spacing:.1em;display:none}
.trade-grid{display:grid;grid-template-columns:1fr 1fr 1fr}
.trade-cell{padding:clamp(7px,.8vw,12px) 6px;text-align:center;border-right:1px solid var(--border)}
.trade-cell:last-child{border-right:none}
.trade-cell-lbl{font-size:clamp(.4rem,.48vw,.54rem);letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.trade-cell-val{font-family:var(--display);font-weight:700;font-size:clamp(.8rem,1.1vw,1.3rem);transition:all .3s}
.trade-cell-val.entry{color:var(--accent)}.trade-cell-val.sl{color:var(--bear)}.trade-cell-val.tp{color:var(--bull)}
.rr-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-top:1px solid var(--border)}
.rr-lbl{font-size:clamp(.4rem,.48vw,.54rem);letter-spacing:.1em;color:var(--muted)}
.rr-val{font-family:var(--display);font-weight:700;font-size:clamp(.72rem,.9vw,1rem);color:var(--gold)}

/* AGENT STATUS */
.agent-status{display:flex;align-items:center;gap:6px;font-size:clamp(.44rem,.52vw,.58rem);color:var(--muted)}
.agent-dot{width:5px;height:5px;border-radius:50%;background:var(--muted)}
.agent-dot.watching{background:var(--bull);animation:pulse 2s infinite}
.agent-dot.thinking{background:var(--gold);animation:blink .8s infinite}

/* CHAT */
.chat-messages{min-height:100px;max-height:clamp(180px,28vh,420px);overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border)}
.msg{padding:7px 10px;border-radius:3px;font-size:clamp(.58rem,.68vw,.74rem);line-height:1.7}
.msg.user{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.15);color:var(--accent);align-self:flex-end;max-width:92%}
.msg.agent{background:var(--s2);border:1px solid var(--border);color:var(--text);align-self:flex-start;max-width:96%}
.msg.agent.thinking{color:var(--muted);font-style:italic;animation:blink 1.3s infinite}
.chat-empty{text-align:center;color:var(--muted);font-size:clamp(.5rem,.58vw,.64rem);padding:16px 10px;line-height:1.8}
.chat-input-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border)}
.chat-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:clamp(.58rem,.68vw,.74rem);padding:6px 8px;border-radius:3px;outline:none;resize:none;transition:border-color .15s}
.chat-input:focus{border-color:var(--accent)}
.chat-send{background:var(--accent);border:none;color:#000;font-family:var(--mono);font-size:clamp(.5rem,.58vw,.64rem);font-weight:700;padding:6px 12px;border-radius:3px;cursor:pointer;flex-shrink:0}
.chat-send:hover{background:#00bcd4}
.chat-send:disabled{opacity:.4;cursor:not-allowed}

/* POPUP */
.popup-wrap{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:clamp(280px,22vw,380px)}
.popup{background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:12px 14px;pointer-events:all;transform:translateX(420px);opacity:0;transition:all .35s cubic-bezier(.175,.885,.32,1.275);position:relative;overflow:hidden;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.popup.show{transform:translateX(0);opacity:1}
.popup.hide{transform:translateX(420px);opacity:0}
.popup::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.popup.type-analysis::before{background:var(--accent)}
.popup.type-trade::before{background:var(--bull)}
.popup.type-trade.bear::before{background:var(--bear)}
.popup.type-update::before{background:var(--purple)}
.popup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.popup-tag{font-size:clamp(.42rem,.5vw,.56rem);letter-spacing:.12em;font-weight:700;padding:2px 7px;border-radius:2px}
.popup-tag.analysis{background:rgba(0,212,255,.12);color:var(--accent);border:1px solid rgba(0,212,255,.3)}
.popup-tag.trade{background:rgba(0,230,118,.12);color:var(--bull);border:1px solid rgba(0,230,118,.3)}
.popup-tag.trade.bear{background:rgba(255,61,87,.12);color:var(--bear);border:1px solid rgba(255,61,87,.3)}
.popup-tag.update{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.3)}
.popup-close{font-size:.7rem;color:var(--muted);cursor:pointer;padding:0 4px}
.popup-body{font-size:clamp(.58rem,.68vw,.74rem);line-height:1.7;color:var(--text)}
.popup-time{font-size:clamp(.44rem,.5vw,.56rem);color:var(--muted);margin-top:5px}

.log{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:5px 9px;font-size:clamp(.46rem,.54vw,.6rem);color:var(--muted);line-height:1.9;max-height:44px;overflow-y:auto;margin-top:6px}
.ok{color:var(--bull)}.warn{color:var(--gold)}.err{color:var(--bear)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border)}
</style>
</head>
<body>

<!-- POPUPS -->
<div class="popup-wrap" id="popupWrap"></div>

<!-- TICKER -->
<div class="ticker-wrap">
  <div style="overflow:hidden;flex:1;position:relative">
    <div class="ticker-track" id="tickerTrack">
      <div class="tick-item"><span class="tick-sym">CONNECTING...</span></div>
    </div>
  </div>
</div>

<div class="wrap">
<header>
  <div class="hrow">
    <div class="logo">TX<em>Y</em>Z</div>
    <div class="hright">
      <div class="pill"><div class="dot off" id="liveDot"></div><span id="liveLabel">OFFLINE</span></div>
      <div class="pill" id="clock">--:--:-- EST</div>
    </div>
  </div>
</header>

<div class="cfg">
  <div class="cfg-g">
    <label>ANTHROPIC KEY</label>
    <input type="password" id="antKey" placeholder="sk-ant-...">
  </div>
  <div class="cfg-g">
    <label>PAIR</label>
    <select id="pairSelect">
      <option value="BTCUSDT">BTC/USDT</option>
      <option value="ETHUSDT">ETH/USDT</option>
      <option value="SOLUSDT">SOL/USDT</option>
      <option value="BNBUSDT">BNB/USDT</option>
      <option value="XRPUSDT">XRP/USDT</option>
      <option value="ADAUSDT">ADA/USDT</option>
      <option value="AVAXUSDT">AVAX/USDT</option>
      <option value="DOGEUSDT">DOGE/USDT</option>
    </select>
  </div>
  <div style="display:flex;gap:6px;align-self:flex-end">
    <button class="btn go" id="startBtn" onclick="startSession()">▶ START</button>
    <button class="btn stop" id="stopBtn" onclick="stopSession()" style="display:none">■ STOP</button>
  </div>
</div>

<div class="main-layout">
  <div>
    <div class="chart-grid">
      <div class="cpanel chart-wide">
        <div class="chdr">
          <div><span class="tf-tag tf-M15">15M</span><span class="role role-draw">LIQUIDITY DRAW</span><span class="live-tag" id="liveTag" style="display:none">● LIVE</span></div>
          <span class="price-info" id="meta-M15"></span>
        </div>
        <div class="chart-body" id="chart-M15"></div>
      </div>
      <div class="cpanel">
        <div class="chdr">
          <div><span class="tf-tag tf-M5">5M</span><span class="role role-bos">BOS</span></div>
          <span class="price-info" id="meta-M5"></span>
        </div>
        <div class="chart-body" id="chart-M5"></div>
      </div>
      <div class="cpanel">
        <div class="chdr">
          <div><span class="tf-tag tf-M1">1M</span><span class="role role-entry">ENTRY</span></div>
          <span class="price-info" id="meta-M1"></span>
        </div>
        <div class="chart-body" id="chart-M1"></div>
      </div>
    </div>
    <div class="log" id="log">System ready. Enter Anthropic key and press START.</div>
  </div>

  <div class="apanel">
    <!-- CONVICTION SCORE -->
    <div class="panel" id="convPanel" style="display:none">
      <div class="phdr">CONVICTION SCORE</div>
      <div style="padding:10px 12px;display:flex;align-items:center;justify-content:space-between">
        <div style="font-family:var(--display);font-weight:700;font-size:1.4rem" id="convScore">—</div>
        <div style="font-size:clamp(.44rem,.52vw,.58rem);color:var(--muted);text-align:right;max-width:200px" id="convReasons"></div>
      </div>
    </div>

    <!-- TRADE BOX -->
    <div class="panel">
      <div class="phdr">TRADE LEVELS<span id="tradeTime" style="font-size:.44rem"></span></div>
      <div class="trade-box" id="tradeBox">
        <div class="trade-box-hdr">
          <span class="dir-badge" id="dirBadge"></span>
          <span id="tradeLabel">NO SETUP YET</span>
        </div>
        <div class="trade-grid">
          <div class="trade-cell"><div class="trade-cell-lbl">ENTRY</div><div class="trade-cell-val entry" id="tradeEntry">—</div></div>
          <div class="trade-cell"><div class="trade-cell-lbl">STOP LOSS</div><div class="trade-cell-val sl" id="tradeSL">—</div></div>
          <div class="trade-cell"><div class="trade-cell-lbl">TAKE PROFIT</div><div class="trade-cell-val tp" id="tradeTP">—</div></div>
        </div>
        <div class="rr-row"><span class="rr-lbl">RISK / REWARD</span><span class="rr-val" id="rrVal">—</span></div>
      </div>
    </div>

    <!-- AGENT -->
    <div class="panel">
      <div class="phdr">
        <div class="agent-status"><div class="agent-dot" id="agentDot"></div><span id="agentStatus">OFFLINE</span></div>
        <button class="btn" id="reAnalyzeBtn" onclick="runAnalysis(false)" style="display:none;font-size:.44rem;padding:3px 8px">⟳ RE-ANALYZE</button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty">Analysis starts automatically.<br>Ask me anything after.</div>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" rows="2" placeholder="Ask the agent..." onkeydown="chatKeydown(event)"></textarea>
        <button class="chat-send" id="chatSend" onclick="sendChat()" disabled>SEND</button>
      </div>
    </div>
  </div>
</div>
</div>

<script>
// ── SESSION ───────────────────────────────────────────────────────────────────
const apexUser=sessionStorage.getItem('apex_user');
if(!apexUser)window.location.href='index.html';

const S={
  running:false,
  charts:{},series:{},
  candles:{M15:[],M5:[],M1:[]},
  ws:{M15:null,M5:null,M1:null},
  marketContext:null,
  derivData:null,
  chatHistory:[],
  analysisTick:null,
  derivTick:null,
};

// ── DERIVATIVES DATA — funding, OI, liquidations (all free Binance) ───────────
async function fetchDerivData(){
  const pair=document.getElementById('pairSelect').value;
  // only futures pairs have this data
  const futuresPair=pair.replace('USDT','')+'USDT';
  try{
    const [fundRes,oiRes,liqRes]=await Promise.all([
      fetch(`https://fapi.binance.com/fapi/v1/premiumIndex?symbol=${futuresPair}`),
      fetch(`https://fapi.binance.com/fapi/v1/openInterest?symbol=${futuresPair}`),
      fetch(`https://fapi.binance.com/futures/data/takerlongshortRatio?symbol=${futuresPair}&period=5m&limit=3`),
    ]);
    const [fund,oi,lsr]=await Promise.all([fundRes.json(),oiRes.json(),liqRes.json()]);

    const fundingRate=parseFloat(fund.lastFundingRate)*100;
    const fundingAnnualized=(fundingRate*3*365).toFixed(1);
    const openInterest=parseFloat(oi.openInterest);
    const lsRatio=Array.isArray(lsr)&&lsr.length?parseFloat(lsr[lsr.length-1].longShortRatio):null;

    S.derivData={
      fundingRate:fundingRate.toFixed(4),
      fundingAnnualized,
      fundingBias:fundingRate>0.05?'OVERLEVERAGED LONGS — bearish signal':fundingRate<-0.05?'OVERLEVERAGED SHORTS — bullish signal':'NEUTRAL funding',
      openInterest:openInterest.toFixed(0),
      lsRatio:lsRatio?.toFixed(2)||'N/A',
      lsBias:lsRatio?lsRatio>1.2?'CROWDED LONGS':lsRatio<0.8?'CROWDED SHORTS':'BALANCED':'N/A',
    };
    log(`Deriv data loaded — Funding: ${fundingRate.toFixed(4)}% | OI: ${openInterest.toFixed(0)}`,'ok');
  }catch(e){
    S.derivData=null;
    log('Derivatives data unavailable (spot pair or network)','warn');
  }
}

// Binance intervals map
const TF={M15:'15m',M5:'5m',M1:'1m'};
const TF_LABELS={M15:'15M',M5:'5M',M1:'1M'};

// Top 20 for ticker
const TICKER_PAIRS=['btcusdt','ethusdt','bnbusdt','solusdt','xrpusdt','adausdt','avaxusdt','dogeusdt','dotusdt','linkusdt','maticusdt','uniusdt','atomusdt','ltcusdt','bchusdt','algousdt','xlmusdt','icpusdt','filusdt','aptusdt'];

let tickerPos=0,tickerRAF=null,tickerPaused=false;

// ── CLOCK ─────────────────────────────────────────────────────────────────────
setInterval(()=>{
  const t=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date());
  document.getElementById('clock').textContent=t+' EST';
},1000);

// ── SAVE/LOAD KEYS ────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem(`txyz_ant_${apexUser}`);
  if(saved)document.getElementById('antKey').value=saved;

  // username in header
  const logo=document.querySelector('.logo');
  if(logo){
    const s=document.createElement('span');
    s.style.cssText='font-size:.48rem;color:var(--muted);margin-left:10px;letter-spacing:.1em;font-family:var(--mono);font-weight:400;vertical-align:middle';
    s.textContent='HI, '+apexUser.toUpperCase();
    logo.appendChild(s);
  }
  // logout
  const hright=document.querySelector('.hright');
  if(hright){
    const btn=document.createElement('button');
    btn.className='btn';btn.textContent='LOGOUT';
    btn.onclick=()=>{sessionStorage.removeItem('apex_user');window.location.href='index.html';};
    hright.appendChild(btn);
  }
  document.getElementById('antKey').addEventListener('change',()=>{
    const v=document.getElementById('antKey').value.trim();
    if(v)localStorage.setItem(`txyz_ant_${apexUser}`,v);
  });

  // start ticker immediately via REST (no key needed)
  loadTickerREST();
  setInterval(loadTickerREST,60000);

  // resize handler
  window.addEventListener('resize',()=>{
    if(!S.running)return;

function startTickerScroll(){
  if(tickerRAF)cancelAnimationFrame(tickerRAF);
  let last=null;
  const speed=0.06;
  function step(ts){
    if(!last)last=ts;
    const dt=ts-last;last=ts;
    if(!tickerPaused){
      tickerPos+=speed*dt;
      const track=document.getElementById('tickerTrack');
      const half=track.scrollWidth/4;
      if(half>0&&tickerPos>=half)tickerPos-=half;
      track.style.transform=`translateX(${-tickerPos}px)`;
    }
    tickerRAF=requestAnimationFrame(step);
  }
  tickerRAF=requestAnimationFrame(step);
}

// ── BINANCE WEBSOCKET — live candle updates ───────────────────────────────────
function connectWS(k){
  const pair=document.getElementById('pairSelect').value.toLowerCase();
  const interval=TF[k];
  const ws=new WebSocket(`wss://stream.binance.com:9443/ws/${pair}@kline_${interval}`);

  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    const kline=msg.k;
    const candle={
      time:Math.floor(kline.t/1000),
      open:parseFloat(kline.o),
      high:parseFloat(kline.h),
      low:parseFloat(kline.l),
      close:parseFloat(kline.c),
    };
    // update or append candle
    const arr=S.candles[k];
    if(arr.length&&arr[arr.length-1].time===candle.time){
      arr[arr.length-1]=candle;
    } else if(candle.time>=(arr[arr.length-1]?.time||0)){
      arr.push(candle);
      if(arr.length>300)arr.shift();
    }
    S.series[k].update(candle);
    setMeta(k,arr);
  };

  ws.onerror=()=>log(`WS ${k} error`,'err');
  ws.onclose=()=>{
    if(S.running){
      log(`WS ${k} reconnecting…`,'warn');
      setTimeout(()=>connectWS(k),3000);
    }
  };
  S.ws[k]=ws;
}

function connectAllWS(){

// ── ICT STRUCTURE ─────────────────────────────────────────────────────────────
function swings(c,lb=3){
  const hi=[],lo=[];
  for(let i=lb;i<c.length-lb;i++){
    const sl=c.slice(i-lb,i+lb+1);
    if(c[i].high===Math.max(...sl.map(x=>x.high)))hi.push(c[i].high);
    if(c[i].low===Math.min(...sl.map(x=>x.low)))lo.push(c[i].low);
  }
  return{hi:hi.slice(-5),lo:lo.slice(-5)};
}
function eqLevels(c,tol=0.001){
  const bsl=[],ssl=[];
  for(let i=0;i<c.length-5;i++)for(let j=i+5;j<c.length;j++){
    if(Math.abs(c[i].high-c[j].high)/c[i].high<tol)bsl.push(((c[i].high+c[j].high)/2).toFixed(2));
    if(Math.abs(c[i].low-c[j].low)/c[i].low<tol)ssl.push(((c[i].low+c[j].low)/2).toFixed(2));
  }
  return{bsl:[...new Set(bsl)].slice(-3),ssl:[...new Set(ssl)].slice(-3)};
}
function fvgs(c){
  const out=[];
  for(let i=2;i<c.length;i++){
    const a=c[i-2],cc=c[i];
    if(cc.low>a.high)out.push({type:'BULL',bot:a.high.toFixed(2),top:cc.low.toFixed(2)});
    if(cc.high<a.low)out.push({type:'BEAR',bot:cc.high.toFixed(2),top:a.low.toFixed(2)});
  }
  return out.slice(-4);
}
function obs(c){
  const out=[];
  for(let i=1;i<c.length-1;i++){
    const cur=c[i],nxt=c[i+1];
    if(cur.close<cur.open&&nxt.close>cur.high)out.push({type:'BULL',bot:cur.close.toFixed(2),top:cur.open.toFixed(2)});
    if(cur.close>cur.open&&nxt.close<cur.low)out.push({type:'BEAR',bot:cur.open.toFixed(2),top:cur.close.toFixed(2)});
  }
  return out.slice(-3);
}
function breakers(c){
  const out=[];
  for(let i=4;i<c.length-1;i++){
    const cur=c[i],nxt=c[i+1];
    const pb=c.slice(i-4,i).find(x=>x.close<x.open);
    if(pb&&cur.close<pb.low&&nxt.close>pb.open)out.push({type:'BULL',price:pb.open.toFixed(2)});
    const pbb=c.slice(i-4,i).find(x=>x.close>x.open);
    if(pbb&&cur.close>pbb.high&&nxt.close<pbb.close)out.push({type:'BEAR',price:pbb.close.toFixed(2)});
  }
  return out.slice(-2);
}
function pda(c){
  const last=c[c.length-1].close;
  const hi=Math.max(...c.slice(-20).map(x=>x.high));
  const lo=Math.min(...c.slice(-20).map(x=>x.low));
  return{pos:last>(hi+lo)/2?'PREMIUM':'DISCOUNT',pct:((last-lo)/(hi-lo)*100).toFixed(0)};
}

function buildCtx(k){
  const c=S.candles[k];if(!c||c.length<10)return null;
  const sw=swings(c),eq=eqLevels(c),fg=fvgs(c),ob=obs(c),brk=breakers(c),pd=pda(c);
  return{
    last:c[c.length-1].close.toFixed(2),pd,
    swHi:sw.hi.map(h=>h.toFixed(2)),swLo:sw.lo.map(l=>l.toFixed(2)),
    bsl:eq.bsl,ssl:eq.ssl,
    fvgs:fg.map(f=>`${f.type} FVG ${f.bot}-${f.top}`),
    obs:ob.map(o=>`${o.type} OB ${o.bot}-${o.top}`),
    brk:brk.map(b=>`${b.type} BRK @${b.price}`),
  };
}

function calcConviction(m15,m5,m1){
  let score=0,reasons=[];
  if(m15.pd.pos==='DISCOUNT'||m15.pd.pos==='PREMIUM'){score++;reasons.push('PDA aligned ✓');}
  if(m15.bsl.length||m15.ssl.length){score++;reasons.push('Liquidity identified ✓');}
  if(m5.fvgs.length||m1.fvgs.length){score++;reasons.push('FVG entry zone ✓');}
  if(m5.obs.length||m1.obs.length){score++;reasons.push('OB present ✓');}
  if(m5.brk.length){score++;reasons.push('Breaker Block ✓');}
  if(S.derivData){
    const fr=parseFloat(S.derivData.fundingRate);
    const disc=m15.pd.pos==='DISCOUNT',prem=m15.pd.pos==='PREMIUM';
    if((disc&&fr<-0.01)||(prem&&fr>0.05)){score++;reasons.push(`Funding aligned (${S.derivData.fundingRate}%) ✓`);}
  }
  if(S.derivData&&S.derivData.lsRatio!=='N/A'){
    const ls=parseFloat(S.derivData.lsRatio),disc=m15.pd.pos==='DISCOUNT',prem=m15.pd.pos==='PREMIUM';
    if((disc&&ls<0.9)||(prem&&ls>1.1)){score++;reasons.push(`L/S ratio (${S.derivData.lsRatio}) aligned ✓`);}
  }
  return{score,max:7,label:score>=6?'🔥 HIGH':score>=4?'⚡ MEDIUM':'⚠ LOW',reasons};
}

function showPopup(text,type='analysis',duration=7000){
  const wrap=document.getElementById('popupWrap');
  const isBear=text.toLowerCase().includes('short')||text.toLowerCase().includes('bearish');
  const popup=document.createElement('div');
  popup.className=`popup type-${type}${type==='trade'&&isBear?' bear':''}`;
  const labels={analysis:'📊 ANALYSIS',trade:'🎯 TRADE',update:'🔄 UPDATE'};
  const tagCls=type==='trade'&&isBear?'trade bear':type;
  const now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  popup.innerHTML=`<div class="popup-header"><span class="popup-tag ${tagCls}">${labels[type]||type.toUpperCase()}</span><span class="popup-close">✕</span></div><div class="popup-body">${text}</div><div class="popup-time">${now} EST</div>`;
  wrap.appendChild(popup);
  requestAnimationFrame(()=>requestAnimationFrame(()=>popup.classList.add('show')));
  const dismiss=()=>{if(popup.classList.contains('hide'))return;popup.classList.add('hide');setTimeout(()=>popup.remove(),350);};
  popup.querySelector('.popup-close').addEventListener('click',e=>{e.stopPropagation();dismiss();});
  popup.addEventListener('click',dismiss);
  setTimeout(dismiss,duration);
}

function parseTrade(text){
  const m=text.match(/TRADE::(LONG|SHORT|NONE)\|?([0-9.]*)\|?([0-9.]*)\|?([0-9.]*)/);
  if(!m)return null;
  return{dir:m[1],entry:m[2],sl:m[3],tp:m[4]};
}

function updateTradeBox(t){
  if(!t||t.dir==='NONE')return;
  const isBull=t.dir==='LONG';
  document.getElementById('tradeBox').className=`trade-box ${isBull?'bull':'bear'}`;
  const badge=document.getElementById('dirBadge');
  badge.style.display='';
  badge.textContent=t.dir;
  badge.style.background=isBull?'rgba(0,230,118,.15)':'rgba(255,61,87,.15)';
  badge.style.color=isBull?'#00e676':'#ff3d57';
  badge.style.border=`1px solid ${isBull?'rgba(0,230,118,.4)':'rgba(255,61,87,.4)'}`;
  badge.style.boxShadow=`0 0 8px ${isBull?'rgba(0,230,118,.3)':'rgba(255,61,87,.3)'}`;
  document.getElementById('tradeLabel').textContent='SETUP';
  document.getElementById('tradeEntry').textContent=t.entry||'—';
  document.getElementById('tradeSL').textContent=t.sl||'—';
  document.getElementById('tradeTP').textContent=t.tp||'—';
  const e=parseFloat(t.entry),s=parseFloat(t.sl),tp=parseFloat(t.tp);
  document.getElementById('rrVal').textContent=(e&&s&&tp)?'1 : '+((Math.abs(tp-e)/Math.abs(e-s)).toFixed(2)):'—';
  document.getElementById('tradeTime').textContent=' · '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}

// ── LOG ───────────────────────────────────────────────────────────────────────
function log(msg,type=''){
  const el=document.getElementById('log'),d=document.createElement('div');
  d.innerHTML=type?`<span class="${type}">[${type}]</span> ${msg}`:msg;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

// ── SESSION ───────────────────────────────────────────────────────────────────
async function startSession(){
  const antKey=document.getElementById('antKey').value.trim();
  if(!antKey){alert('Enter your Anthropic API key.');return;}
  localStorage.setItem(`txyz_ant_${apexUser}`,antKey);

  S.running=true;
  document.getElementById('startBtn').style.display='none';
  document.getElementById('stopBtn').style.display='';
  document.getElementById('liveDot').className='dot live';
  document.getElementById('liveLabel').textContent='LIVE';
  document.getElementById('liveTag').style.display='';

  // wait for layout
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  initCharts();
  await new Promise(r=>setTimeout(r,80));

  // load historical candles
  log('Loading historical candles from Binance…');
  await loadAllCandles();

  // fetch derivatives data
  log('Fetching funding rates & open interest…');
  await fetchDerivData();
  S.derivTick=setInterval(fetchDerivData,60000); // refresh every minute

  // connect live WebSockets
  log('Connecting live WebSocket streams…');
  connectAllWS();

  setAgentStatus('watching');
  document.getElementById('chatSend').disabled=false;

  // auto-analyze immediately
  log('Starting analysis…','ok');
  await runAnalysis(false);

  // auto-analysis every 2 minutes
  clearInterval(S.analysisTick);
  S.analysisTick=setInterval(()=>{
    if(S.running)runAnalysis(true);
  },120000);
}

function stopSession(){
  S.running=false;
  clearInterval(S.analysisTick);
  clearInterval(S.derivTick);
  closeAllWS();
  document.getElementById('startBtn').style.display='';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('liveDot').className='dot off';
  document.getElementById('liveLabel').textContent='OFFLINE';
  document.getElementById('liveTag').style.display='none';
  document.getElementById('chatSend').disabled=true;
  setAgentStatus('offline');
  log('Session stopped.','warn');
}
</script>
</body>
</html>
