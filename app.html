<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TXYZ — ICT Scalp</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="./lightweight-charts.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090c;--s1:#0c1017;--s2:#101520;--border:#1a2535;
  --accent:#00d4ff;--text:#c8d8e8;--muted:#4a6a84;
  --bull:#00e676;--bear:#ff3d57;--gold:#f0b429;--purple:#a78bfa;
  --mono:'Space Mono',monospace;--display:'Syne',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:clamp(12px,1vw,16px);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.02) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:100%;margin:0 auto;padding:0 clamp(10px,1.5vw,24px) 20px}

/* ── TICKER BANNER — LED style ── */
.ticker-wrap{background:#000;border-bottom:2px solid #003300;overflow:hidden;height:clamp(40px,3.5vw,56px);display:flex;align-items:center;margin:0 -14px;padding:0;position:relative;box-shadow:0 2px 20px rgba(0,230,118,.15) inset, 0 -1px 0 #001a00}
.ticker-track{display:flex;gap:0;white-space:nowrap;will-change:transform;cursor:default}
.ticker-track:hover{cursor:not-allowed}
.tick-item{display:inline-flex;align-items:center;gap:clamp(8px,1vw,14px);padding:0 clamp(16px,1.5vw,28px);height:clamp(40px,3.5vw,56px);border-right:1px solid #001800;flex-shrink:0}
.tick-sym{color:#00ff41;font-weight:700;font-size:clamp(.75rem,1vw,1.05rem);letter-spacing:.15em;text-shadow:0 0 10px #00ff41,0 0 20px rgba(0,255,65,.4);font-family:'Space Mono',monospace}
.tick-price{color:#ccffcc;font-size:clamp(.72rem,.95vw,1rem);letter-spacing:.05em;font-family:'Space Mono',monospace;text-shadow:0 0 6px rgba(180,255,180,.5)}
.tick-chg{font-size:clamp(.65rem,.85vw,.9rem);letter-spacing:.04em;font-family:'Space Mono',monospace;font-weight:700}
.tick-chg.up{color:#00ff41;text-shadow:0 0 8px #00ff41,0 0 16px rgba(0,255,65,.5)}
.tick-chg.down{color:#ff2244;text-shadow:0 0 8px #ff2244,0 0 16px rgba(255,34,68,.5)}
.tick-sep{color:#004400;font-size:.55rem;padding:0 6px;text-shadow:none}
.ticker-label{position:absolute;left:0;top:0;height:40px;display:flex;align-items:center;padding:0 14px;background:#000;border-right:2px solid #00ff41;z-index:3;font-size:.55rem;letter-spacing:.2em;color:#00ff41;font-weight:700;text-shadow:0 0 10px #00ff41,0 0 20px rgba(0,255,65,.5);white-space:nowrap;box-shadow:4px 0 15px rgba(0,255,65,.2)}

/* HEADER */
header{padding:clamp(8px,1vw,14px) 0;margin-bottom:clamp(8px,1vw,14px);border-bottom:1px solid var(--border)}
.hrow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.logo{font-family:var(--display);font-weight:800;font-size:clamp(1.1rem,1.8vw,2rem);color:#fff;letter-spacing:-.02em}
.logo em{color:var(--accent);font-style:normal}
.logo small{font-size:.52rem;color:var(--muted);margin-left:8px;letter-spacing:.1em;font-family:var(--mono);font-weight:400}
.hright{display:flex;align-items:center;gap:8px}
.pill{display:flex;align-items:center;gap:5px;font-size:.52rem;letter-spacing:.1em;color:var(--muted);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
.dot{width:5px;height:5px;border-radius:50%}
.dot.live{background:var(--bull);animation:pulse 2s infinite}
.dot.off{background:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* CONFIG */
.cfg{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;padding:8px 12px;background:var(--s1);border:1px solid var(--border);border-radius:3px;margin-bottom:10px}
.cfg-g{display:flex;flex-direction:column;gap:3px}
.cfg-g label{font-size:.48rem;letter-spacing:.1em;color:var(--muted)}
input[type=password]{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.68rem;padding:5px 8px;border-radius:3px;outline:none;transition:border-color .15s;width:145px}
input:focus{border-color:var(--accent)}
select{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.68rem;padding:5px 8px;border-radius:3px;outline:none;cursor:pointer}
.btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:.55rem;letter-spacing:.08em;padding:5px 11px;cursor:pointer;border-radius:3px;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.go{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.btn.go:hover{background:#00bcd4}
.btn.stop{border-color:var(--bear);color:var(--bear)}

/* LAYOUT */
.main-layout{display:grid;grid-template-columns:1fr clamp(300px,22vw,440px);gap:clamp(8px,1vw,16px);align-items:start}
@media(max-width:1100px){.main-layout{grid-template-columns:1fr}}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.chart-wide{grid-column:1 / -1}
.cpanel{background:var(--s1);border:1px solid var(--border);border-radius:3px;overflow:hidden;display:flex;flex-direction:column}
.chdr{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.tf-tag{font-size:.52rem;letter-spacing:.1em;font-weight:700}
.tf-M15{color:var(--bull)}.tf-M5{color:var(--accent)}.tf-M1{color:var(--purple)}
.role{font-size:.4rem;letter-spacing:.06em;padding:1px 6px;border-radius:2px;border:1px solid;margin-left:5px}
.role-draw{border-color:rgba(0,230,118,.3);color:rgba(0,230,118,.7)}
.role-bos{border-color:rgba(0,212,255,.3);color:rgba(0,212,255,.7)}
.role-entry{border-color:rgba(167,139,250,.3);color:rgba(167,139,250,.7)}
.price-info{font-size:.5rem;color:var(--muted)}
.price-info span{color:var(--text)}
.chart-body{flex:1;min-height:0}
.live-tag{font-size:.38rem;color:var(--bull);margin-left:6px;animation:pulse 2s infinite}

/* RIGHT PANEL */
.apanel{display:flex;flex-direction:column;gap:8px;position:sticky;top:10px;max-height:calc(100vh - 100px);overflow-y:auto}
.apanel::-webkit-scrollbar{width:3px}
.apanel::-webkit-scrollbar-thumb{background:var(--border)}
.panel{background:var(--s1);border:1px solid var(--border);border-radius:3px;overflow:hidden;flex-shrink:0}
.phdr{padding:7px 12px;border-bottom:1px solid var(--border);font-size:.48rem;letter-spacing:.12em;color:var(--muted);display:flex;align-items:center;justify-content:space-between}

/* TRADE BOX */
.trade-box{margin:8px 12px 10px;border:1px solid var(--border);border-radius:3px;overflow:hidden;transition:border-color .3s}
.trade-box.bull{border-color:rgba(0,230,118,.5)}
.trade-box.bear{border-color:rgba(255,61,87,.5)}
.trade-box.empty{border-color:var(--border)}
.trade-box-hdr{padding:5px 10px;font-size:.44rem;letter-spacing:.1em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--s2);display:flex;align-items:center;justify-content:space-between}
.trade-grid{display:grid;grid-template-columns:1fr 1fr 1fr}
.trade-cell{padding:10px 6px;text-align:center;border-right:1px solid var(--border)}
.trade-cell:last-child{border-right:none}
.trade-cell-lbl{font-size:.42rem;letter-spacing:.1em;color:var(--muted);margin-bottom:5px}
.trade-cell-val{font-family:var(--display);font-weight:700;font-size:clamp(.85rem,1.2vw,1.3rem);transition:all .3s}
.trade-cell-val.entry{color:var(--accent)}
.trade-cell-val.sl{color:var(--bear)}
.trade-cell-val.tp{color:var(--bull)}
.trade-cell-val.empty{color:var(--border);font-size:.65rem}
.rr-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-top:1px solid var(--border)}
.rr-lbl{font-size:.44rem;letter-spacing:.1em;color:var(--muted)}
.rr-val{font-family:var(--display);font-weight:700;font-size:.8rem;color:var(--gold)}

/* ANALYZE BUTTON */
.analyze-btn{width:100%;background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(0,212,255,.05));border:1px solid var(--accent);color:var(--accent);font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;padding:11px;cursor:pointer;border-radius:3px;transition:all .2s;text-align:center;font-weight:700}
.analyze-btn:hover{background:linear-gradient(135deg,rgba(0,212,255,.25),rgba(0,212,255,.1))}
.analyze-btn:disabled{opacity:.35;cursor:not-allowed}

/* CHAT */
.chat-messages{min-height:120px;max-height:clamp(200px,30vh,480px);overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border)}
.msg{padding:8px 10px;border-radius:3px;font-size:.62rem;line-height:1.7}
.msg.user{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.15);color:var(--accent);align-self:flex-end;max-width:92%}
.msg.agent{background:var(--s2);border:1px solid var(--border);color:var(--text);align-self:flex-start;max-width:96%}
.msg.agent.thinking{color:var(--muted);font-style:italic;animation:blink 1.3s infinite}
.msg.system{background:rgba(240,180,41,.06);border:1px solid rgba(240,180,41,.2);color:var(--gold);font-size:.56rem;text-align:center;align-self:center}
.chat-empty{text-align:center;color:var(--muted);font-size:.58rem;padding:20px 10px;line-height:1.9}
.chat-input-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border)}
.chat-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.62rem;padding:6px 8px;border-radius:3px;outline:none;resize:none;transition:border-color .15s}
.chat-input:focus{border-color:var(--accent)}
.chat-send{background:var(--accent);border:none;color:#000;font-family:var(--mono);font-size:.55rem;font-weight:700;padding:6px 12px;border-radius:3px;cursor:pointer;flex-shrink:0}
.chat-send:hover{background:#00bcd4}
.chat-send:disabled{opacity:.4;cursor:not-allowed}

/* POPUP NOTIFICATION */
.popup-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none;max-width:360px}
.popup{background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:14px 16px;pointer-events:all;transform:translateX(400px);opacity:0;transition:all .4s cubic-bezier(.175,.885,.32,1.275);position:relative;overflow:hidden;cursor:pointer}
.popup.show{transform:translateX(0);opacity:1}
.popup.hide{transform:translateX(400px);opacity:0}
.popup::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.popup.type-analysis::before{background:var(--accent)}
.popup.type-trade::before{background:var(--bull)}
.popup.type-trade.bear::before{background:var(--bear)}
.popup.type-alert::before{background:var(--gold)}
.popup.type-update::before{background:var(--purple)}
.popup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.popup-tag{font-size:.46rem;letter-spacing:.12em;font-weight:700;padding:2px 7px;border-radius:2px}
.popup-tag.analysis{background:rgba(0,212,255,.12);color:var(--accent);border:1px solid rgba(0,212,255,.3)}
.popup-tag.trade{background:rgba(0,230,118,.12);color:var(--bull);border:1px solid rgba(0,230,118,.3)}
.popup-tag.trade.bear{background:rgba(255,61,87,.12);color:var(--bear);border:1px solid rgba(255,61,87,.3)}
.popup-tag.alert{background:rgba(240,180,41,.12);color:var(--gold);border:1px solid rgba(240,180,41,.3)}
.popup-tag.update{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.3)}
.popup-close{font-size:.7rem;color:var(--muted);cursor:pointer;line-height:1;padding:0 4px}
.popup-close:hover{color:var(--text)}
.popup-body{font-size:.65rem;line-height:1.7;color:var(--text)}
.popup-time{font-size:.48rem;color:var(--muted);margin-top:6px}
.popup-progress{position:absolute;bottom:0;left:0;height:2px;background:rgba(255,255,255,.1);width:100%;transform-origin:left}

/* AGENT STATUS */
.agent-status{display:flex;align-items:center;gap:6px;font-size:.48rem;color:var(--muted)}
.agent-dot{width:5px;height:5px;border-radius:50%;background:var(--muted)}
.agent-dot.watching{background:var(--bull);animation:pulse 2s infinite}
.agent-dot.thinking{background:var(--gold);animation:blink 0.8s infinite}
.log{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:5px 9px;font-size:.5rem;color:var(--muted);line-height:1.9;max-height:46px;overflow-y:auto;margin-top:8px}
.ok{color:var(--bull)}.warn{color:var(--gold)}.err{color:var(--bear)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border)}
</style>
</head>
<body>

<!-- TICKER BANNER -->
<!-- POPUP NOTIFICATIONS -->
<div class="popup-wrap" id="popupWrap"></div>

<div class="ticker-wrap">
  <div style="overflow:hidden;flex:1;position:relative">
    <div class="ticker-track" id="tickerTrack">
      <div class="tick-item"><span class="tick-sym" style="animation:blink 1s infinite">LOADING...</span></div>
    </div>
  </div>
</div>

<div class="wrap">
<header>
  <div class="hrow">
    <div class="logo">TXYZ <small>SCALP</small></div>
    <div class="hright">
      <div class="pill"><div class="dot off" id="liveDot"></div><span id="liveLabel">OFFLINE</span></div>
      <div class="pill" id="clock">--:-- EST</div>
    </div>
  </div>
</header>

<div class="cfg">
  <div class="cfg-g">
    <label>TWELVE DATA KEY</label>
    <input type="password" id="tdKey" placeholder="your_key_here">
  </div>
  <div class="cfg-g">
    <label>ANTHROPIC KEY</label>
    <input type="password" id="antKey" placeholder="sk-ant-...">
  </div>
  <div class="cfg-g">
    <label>STRUMENTO</label>
    <select id="symbolSelect">
      <option value="BTC/USD">BTC/USD</option>
      <option value="ETH/USD">ETH/USD</option>
      <option value="XAU/USD">XAU/USD (Gold)</option>
      <option value="QQQ">QQQ (NQ Proxy)</option>
      <option value="EUR/USD">EUR/USD</option>
    </select>
  </div>
  <div style="display:flex;gap:6px;align-self:flex-end">
    <button class="btn go" id="startBtn" onclick="startSession()">▶ START</button>
    <button class="btn stop" id="stopBtn" onclick="stopSession()" style="display:none">■ STOP</button>
  </div>
</div>

<div class="main-layout">

  <!-- CHARTS -->
  <div>
    <div class="chart-grid">
      <div class="cpanel chart-wide">
        <div class="chdr">
          <div>
            <span class="tf-tag tf-M15">15M</span>
            <span class="role role-draw">LIQUIDITY DRAW</span>
            <span class="live-tag" id="liveTag" style="display:none">● LIVE</span>
          </div>
          <span class="price-info" id="meta-M15"></span>
        </div>
        <div class="chart-body" id="chart-M15"></div>
      </div>
      <div class="cpanel">
        <div class="chdr">
          <div><span class="tf-tag tf-M5">5M</span><span class="role role-bos">BOS</span></div>
          <span class="price-info" id="meta-M5"></span>
        </div>
        <div class="chart-body" id="chart-M5"></div>
      </div>
      <div class="cpanel">
        <div class="chdr">
          <div><span class="tf-tag tf-M1">1M</span><span class="role role-entry">ENTRY</span></div>
          <span class="price-info" id="meta-M1"></span>
        </div>
        <div class="chart-body" id="chart-M1"></div>
      </div>
    </div>
    <div class="log" id="log">System ready. Enter keys and press START.</div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="apanel">

    <!-- TRADE BOX -->
    <div class="panel">
      <div class="phdr">TRADE LEVELS<span id="tradeTime" style="font-size:.44rem"></span></div>
      <div class="trade-box empty" id="tradeBox">
        <div class="trade-box-hdr">
          <div style="display:flex;align-items:center;gap:8px">
            <span id="dirBadge" style="display:none;font-size:.55rem;font-weight:700;padding:2px 10px;border-radius:2px;letter-spacing:.1em"></span>
            <span id="tradeLabel">NO SETUP YET</span>
          </div>
          <span class="rr-val" id="tradeRR" style="font-size:.7rem"></span>
        </div>
        <div class="trade-grid">
          <div class="trade-cell">
            <div class="trade-cell-lbl">ENTRY</div>
            <div class="trade-cell-val entry empty" id="tradeEntry">—</div>
          </div>
          <div class="trade-cell">
            <div class="trade-cell-lbl">STOP LOSS</div>
            <div class="trade-cell-val sl empty" id="tradeSL">—</div>
          </div>
          <div class="trade-cell">
            <div class="trade-cell-lbl">TAKE PROFIT</div>
            <div class="trade-cell-val tp empty" id="tradeTP">—</div>
          </div>
        </div>
        <div class="rr-row">
          <span class="rr-lbl">RISK / REWARD</span>
          <span class="rr-val" id="rrVal">—</span>
        </div>
      </div>
    </div>

    <!-- CHAT -->
    <div class="panel">
      <div class="phdr">
        <div class="agent-status"><div class="agent-dot" id="agentDot"></div><span id="agentStatus">OFFLINE</span></div>
        <button class="btn" id="reAnalyzeBtn" onclick="runAnalysis()" style="display:none;font-size:.44rem;padding:3px 8px">⟳ RE-ANALYZE</button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty" id="chatEmpty">Agent starting up...<br>Analysis will begin automatically.</div>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" rows="2" placeholder="Ask the agent..." onkeydown="chatKeydown(event)"></textarea>
        <button class="chat-send" id="chatSend" onclick="sendChat()" disabled>SEND</button>
      </div>
    </div>

  </div>
</div>
</div>

<script>
// ── SESSION CHECK ─────────────────────────────────────────────────────────────
const apexUser=sessionStorage.getItem('apex_user');
if(!apexUser){window.location.href='index.html';}

// ── LOAD SAVED API KEYS ───────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  // load saved keys for this user
  const savedTD=localStorage.getItem(`apex_td_${apexUser}`);
  const savedAnt=localStorage.getItem(`apex_ant_${apexUser}`);
  if(savedTD)document.getElementById('tdKey').value=savedTD;
  if(savedAnt)document.getElementById('antKey').value=savedAnt;

  // show username in header
  const logoEl=document.querySelector('.logo');
  if(logoEl&&apexUser){
    const span=document.createElement('span');
    span.style.cssText='font-size:.48rem;color:var(--muted);margin-left:12px;letter-spacing:.1em;font-family:var(--mono);font-weight:400;vertical-align:middle';
    span.textContent='HI, '+apexUser.toUpperCase();
    logoEl.appendChild(span);
  }
  // logout button
  const hright=document.querySelector('.hright');
  if(hright){
    const btn=document.createElement('button');
    btn.className='btn';
    btn.textContent='LOGOUT';
    btn.onclick=()=>{sessionStorage.removeItem('apex_user');window.location.href='index.html';};
    hright.appendChild(btn);
  }

  // auto-save keys when changed
  document.getElementById('tdKey').addEventListener('change',()=>{
    const val=document.getElementById('tdKey').value.trim();
    if(val){
      localStorage.setItem(`apex_td_${apexUser}`,val);
      loadTicker(); // reload ticker immediately when key is set
    }
  });
  document.getElementById('antKey').addEventListener('change',()=>{
    const val=document.getElementById('antKey').value.trim();
    if(val)localStorage.setItem(`apex_ant_${apexUser}`,val);
  });
  // start ticker immediately — no need to wait for session
  setTimeout(()=>startTickerRefresh(),300);

  // reinit chart heights on resize
  window.addEventListener("resize",()=>{
    if(!S.running)return;
    ["M15","M5","M1"].forEach(k=>{
      const el=document.getElementById("chart-"+k);
      if(!el||!S.charts[k])return;
      const rows=k==="M15"?2:2.5;
      const h=getH(rows);
      el.style.height=h+"px";
      S.charts[k].resize(el.clientWidth,h);
    });
  });
});

const S={
  running:false,
  charts:{},series:{},
  candles:{M15:[],M5:[],M1:[]},
  marketContext:null,
  chatHistory:[],
  syncTick:null,
  tickerTick:null,
};

const TICKER_SYMBOLS=['BTC/USD','ETH/USD','BNB/USD','SOL/USD','XRP/USD','ADA/USD','AVAX/USD','DOGE/USD','DOT/USD','LINK/USD','MATIC/USD','UNI/USD','ATOM/USD','LTC/USD','BCH/USD','ALGO/USD','XLM/USD','ICP/USD','FIL/USD','APT/USD'];

function getSymbol(){return document.getElementById('symbolSelect').value;}

setInterval(()=>{
  const t=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date());
  document.getElementById('clock').textContent=t+' EST';
},1000);

function log(msg,type=''){

let tickerPrices=[];
let tickerPos=0;
let tickerRAF=null;

function renderTickerHTML(prices){
  return prices.map(p=>{
    const up=p.chg>=0;
    const arrow=up?'▲':'▼';
    const chgStr=arrow+' '+(up?'+':'')+p.chg.toFixed(2)+'%';
    return`<div class="tick-item">` +
      `<span class="tick-sym">${p.sym}</span>` +
      `<span class="tick-price">${p.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>` +
      `<span class="tick-chg ${up?'up':'down'}">${chgStr}</span>` +
      `<span class="tick-sep">|</span>` +
      `</div>`;
  }).join('');
}

function startTickerScroll(){
  if(tickerRAF)cancelAnimationFrame(tickerRAF);
  const track=document.getElementById('tickerTrack');
  let lastTime=null;
  const speed=0.08;
  let paused=false;
  const tickerEl=document.getElementById('tickerTrack');
  tickerEl.addEventListener('mouseenter',()=>paused=true);
  tickerEl.addEventListener('mouseleave',()=>paused=false);

  function step(ts){
    if(!lastTime)lastTime=ts;
    const dt=ts-lastTime;lastTime=ts;
    if(!paused){
      tickerPos+=speed*dt;
      const half=tickerEl.scrollWidth/2;
      if(half>0&&tickerPos>=half)tickerPos-=half;
      tickerEl.style.transform=`translateX(${-tickerPos}px)`;
    }
    tickerRAF=requestAnimationFrame(step);
  }
  tickerRAF=requestAnimationFrame(step);
}

async function loadTicker(){
  const key=(localStorage.getItem(`apex_td_${apexUser}`)||document.getElementById('tdKey').value||'').trim();
  if(!key)return;
  try{
    // ONE batch call for all symbols instead of 20 individual calls
    const syms=TICKER_SYMBOLS.join(',');
    const r=await fetch(`https://api.twelvedata.com/price?symbol=${encodeURIComponent(syms)}&apikey=${key}`);
    const d=await r.json();
    // also get previous close for % change in one call
    const r2=await fetch(`https://api.twelvedata.com/eod?symbol=${encodeURIComponent(syms)}&apikey=${key}`);
    const d2=await r2.json();

    const prices=[];
    TICKER_SYMBOLS.forEach(sym=>{
      const shortSym=sym.replace('/USD','');
      const priceData=d[sym]||d[shortSym];
      const eodData=d2[sym]||d2[shortSym];
      if(priceData?.price){
        const price=parseFloat(priceData.price);
        const prev=eodData?.close?parseFloat(eodData.close):price;
        const chg=((price-prev)/prev)*100;
        prices.push({sym:shortSym,price,chg:isNaN(chg)?0:chg});
      }
    });

    if(!prices.length)return;
    tickerPrices=prices;
    const html=renderTickerHTML(prices);
    const track=document.getElementById('tickerTrack');
    track.innerHTML=html+html+html+html;
    tickerPos=0;
    if(!tickerRAF)startTickerScroll();
  }catch(e){log('Ticker error: '+e.message,'warn');}
}

function startTickerRefresh(){
  loadTicker();
  S.tickerTick=setInterval(loadTicker,60000);
}

// ── ICT DETECTION ────────────────────────────────────────────────────────────
function detectEqLevels(c,tol=0.001){
  const bsl=[],ssl=[];
  for(let i=0;i<c.length-5;i++)for(let j=i+5;j<c.length;j++){
    if(Math.abs(c[i].high-c[j].high)/c[i].high<tol)bsl.push(((c[i].high+c[j].high)/2).toFixed(2));
    if(Math.abs(c[i].low-c[j].low)/c[i].low<tol)ssl.push(((c[i].low+c[j].low)/2).toFixed(2));
  }
  return{bsl:[...new Set(bsl)].slice(-3),ssl:[...new Set(ssl)].slice(-3)};
}
function detectFVGs(c){
  const out=[];
  for(let i=2;i<c.length;i++){
    const a=c[i-2],cc=c[i];
    if(cc.low>a.high)out.push({type:'BULL',bot:a.high,top:cc.low});
    if(cc.high<a.low)out.push({type:'BEAR',bot:cc.high,top:a.low});
  }
  return out.slice(-4);
}
function detectOBs(c){
  const out=[];
  for(let i=1;i<c.length-1;i++){
    const cur=c[i],nxt=c[i+1];
    if(cur.close<cur.open&&nxt.close>cur.high)out.push({type:'BULL',bot:cur.close,top:cur.open});
    if(cur.close>cur.open&&nxt.close<cur.low)out.push({type:'BEAR',bot:cur.open,top:cur.close});
  }
  return out.slice(-4);
}
function detectBreakers(c){
  const out=[];
  for(let i=4;i<c.length-1;i++){
    const cur=c[i],nxt=c[i+1];
    const pb=c.slice(i-4,i).find(x=>x.close<x.open);
    if(pb&&cur.close<pb.low&&nxt.close>pb.open)out.push({type:'BULL',price:pb.open.toFixed(2)});
    const pbb=c.slice(i-4,i).find(x=>x.close>x.open);
    if(pbb&&cur.close>pbb.high&&nxt.close<pbb.close)out.push({type:'BEAR',price:pbb.close.toFixed(2)});
  }
  return out.slice(-2);
}
function swings(c,lb=3){
  const hi=[],lo=[];
  for(let i=lb;i<c.length-lb;i++){
    const sl=c.slice(i-lb,i+lb+1);
    if(c[i].high===Math.max(...sl.map(x=>x.high)))hi.push(c[i].high);
    if(c[i].low===Math.min(...sl.map(x=>x.low)))lo.push(c[i].low);
  }
  return{hi:hi.slice(-5),lo:lo.slice(-5)};
}
function pdaCalc(c){
  const last=c[c.length-1].close;
  const hi=Math.max(...c.slice(-20).map(x=>x.high));
  const lo=Math.min(...c.slice(-20).map(x=>x.low));
  return{pos:last>(hi+lo)/2?'PREMIUM':'DISCOUNT',pct:((last-lo)/(hi-lo)*100).toFixed(0)};
}
function buildCtx(key){
  const c=S.candles[key];if(!c.length)return null;
  const sw=swings(c),eq=detectEqLevels(c),fvgs=detectFVGs(c),obs=detectOBs(c),brk=detectBreakers(c),pd=pdaCalc(c);
  return{
    last:c[c.length-1].close.toFixed(2),pda:pd,
    swHi:sw.hi.map(h=>h.toFixed(2)),swLo:sw.lo.map(l=>l.toFixed(2)),
    bsl:eq.bsl,ssl:eq.ssl,
    fvgs:fvgs.map(f=>`${f.type} FVG ${f.bot.toFixed(2)}-${f.top.toFixed(2)}`),
    obs:obs.map(o=>`${o.type} OB ${o.bot.toFixed(2)}-${o.top.toFixed(2)}`),
    brk:brk.map(b=>`${b.type} BRK @${b.price}`),
  };
}

function buildMarketSummary(){
  const M15=buildCtx('M15'),M5=buildCtx('M5'),M1=buildCtx('M1');
  if(!M15||!M5||!M1)return null;
  const sym=getSymbol();
  return`${sym} scalp data (${new Date().toLocaleTimeString()}):
15M: price=${M15.last} | ${M15.pda.pos} ${M15.pda.pct}% | SwingHi:${M15.swHi.join(',')} | SwingLo:${M15.swLo.join(',')} | BSL:${M15.bsl.join(',')||'none'} | SSL:${M15.ssl.join(',')||'none'} | FVG:${M15.fvgs.join('|')||'none'} | OB:${M15.obs.join('|')||'none'}
5M: price=${M5.last} | ${M5.pda.pos} ${M5.pda.pct}% | SwingHi:${M5.swHi.join(',')} | SwingLo:${M5.swLo.join(',')} | BSL:${M5.bsl.join(',')||'none'} | SSL:${M5.ssl.join(',')||'none'} | FVG:${M5.fvgs.join('|')||'none'} | OB:${M5.obs.join('|')||'none'} | BRK:${M5.brk.join('|')||'none'}
1M: price=${M1.last} | ${M1.pda.pos} ${M1.pda.pct}% | FVG:${M1.fvgs.join('|')||'none'} | OB:${M1.obs.join('|')||'none'}`;
}

function showPopup(text,type='analysis',duration=6000){
  const wrap=document.getElementById('popupWrap');
  const popup=document.createElement('div');
  const isBear=text.toLowerCase().includes('short')||text.toLowerCase().includes('bearish');
  const extraClass=(type==='trade'&&isBear)?' bear':'';
  popup.className=`popup type-${type}${extraClass}`;
  const tagLabels={analysis:'📊 ANALYSIS',trade:'🎯 TRADE SETUP',alert:'⚠ ALERT',update:'🔄 UPDATE'};
  const tagClass=(type==='trade'&&isBear)?'trade bear':type;
  const now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  popup.innerHTML=`
    <div class="popup-header">
      <span class="popup-tag ${tagClass}">${tagLabels[type]||type.toUpperCase()}</span>
      <span class="popup-close">✕</span>
    </div>
    <div class="popup-body">${text}</div>
    <div class="popup-time">${now} EST</div>`;
  wrap.appendChild(popup);
  requestAnimationFrame(()=>requestAnimationFrame(()=>popup.classList.add('show')));
  const dismiss=()=>{
    if(popup.classList.contains('hide'))return;
    popup.classList.add('hide');
    setTimeout(()=>popup.remove(),400);
  };
  popup.querySelector('.popup-close').addEventListener('click',e=>{e.stopPropagation();dismiss();});
  popup.addEventListener('click',dismiss);
  setTimeout(dismiss,duration);
}

// ── ANALYZE ───────────────────────────────────────────────────────────────────
async function runAnalysis(isAuto=false){
  const antKey=document.getElementById('antKey').value.trim();
  if(!antKey||!S.candles.M15.length)return;
  setAgentStatus('thinking');
  const ctx=buildMarketSummary();
  if(!ctx){setAgentStatus('watching');return;}
  const prevContext=S.marketContext;
  S.marketContext=ctx;
  const isFirstRun=!prevContext;
  const sys=buildAgentSystem();
  const prompt=isFirstRun
    ?`I just started monitoring ${getSymbol()}. Give me an immediate ICT scalp read — structure, draw, what to watch. Max 2 sentences.`
    :`${getSymbol()} just updated. Any change in the last 90 seconds? New sweep, BOS, or entry forming? If yes be specific and urgent. If nothing changed say "No change" only. Max 2 sentences.`;
  S.chatHistory.push({role:'user',content:prompt});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':antKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:300,system:sys,messages:S.chatHistory}),
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const rawReply=data.content?.map(b=>b.text||'').join('');
    const displayReply=rawReply.replace(/TRADE::(LONG|SHORT|NONE)[^\n]*/g,'').trim();
    S.chatHistory.push({role:'assistant',content:rawReply});
    if(S.chatHistory.length>40)S.chatHistory=S.chatHistory.slice(-40);
    const trade=parseTradeLine(rawReply);
    const hasTrade=trade&&trade.dir!=='NONE';
    if(hasTrade)updateTradeBox(trade);
    if(isFirstRun||hasTrade||!isAuto){
      addAgentMsgToChat(displayReply);
      showPopup(displayReply,hasTrade?'trade':(isFirstRun?'analysis':'update'));
    } else {
      const noChange=displayReply.toLowerCase().startsWith('no change')||displayReply.toLowerCase().includes('nothing changed')||displayReply.toLowerCase().includes('unchanged')||displayReply.toLowerCase().includes('same setup')||displayReply.trim().toLowerCase()==='no change.';
      if(!noChange){
        addAgentMsgToChat(displayReply);
        showPopup(displayReply,'update');
      }
    }
    document.getElementById('chatSend').disabled=false;
    const rb=document.getElementById('reAnalyzeBtn');if(rb)rb.style.display='';
    setAgentStatus('watching');
    log('Analysis complete','ok');
  }catch(e){
    setAgentStatus('watching');
    log('Error: '+e.message,'err');
  }
}

ICT SCALP SETUP:

function parseTradeLine(text){
  const m=text.match(/TRADE::(LONG|SHORT|NONE)\|?([0-9.]*)\|?([0-9.]*)\|?([0-9.]*)/);
  if(!m)return null;
  if(m[1]==='NONE')return{dir:'NONE'};
  return{dir:m[1],entry:m[2],sl:m[3],tp:m[4]};
}

function updateTradeBox(trade){
  if(!trade||trade.dir==='NONE')return;
  const isBull=trade.dir==='LONG';
  const tb=document.getElementById('tradeBox');
  tb.className=`trade-box ${isBull?'bull':'bear'}`;

  // direction badge
  const badge=document.getElementById('dirBadge');
  badge.style.display='';
  badge.textContent=trade.dir;
  badge.style.background=isBull?'rgba(0,230,118,.15)':'rgba(255,61,87,.15)';
  badge.style.color=isBull?'#00e676':'#ff3d57';
  badge.style.border=`1px solid ${isBull?'rgba(0,230,118,.5)':'rgba(255,61,87,.5)'}`;
  badge.style.boxShadow=`0 0 8px ${isBull?'rgba(0,230,118,.3)':'rgba(255,61,87,.3)'}`;

  document.getElementById('tradeEntry').textContent=trade.entry||'—';
  document.getElementById('tradeEntry').className='trade-cell-val entry';
  document.getElementById('tradeSL').textContent=trade.sl||'—';
  document.getElementById('tradeSL').className='trade-cell-val sl';
  document.getElementById('tradeTP').textContent=trade.tp||'—';
  document.getElementById('tradeTP').className='trade-cell-val tp';

  const e=parseFloat(trade.entry),s=parseFloat(trade.sl),t=parseFloat(trade.tp);
  if(e&&s&&t){
    const rr=(Math.abs(t-e)/Math.abs(e-s)).toFixed(2);
    document.getElementById('rrVal').textContent='1 : '+rr;

  document.getElementById('tradeTime').textContent=' · '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});

async function sendChat(){
  const antKey=document.getElementById('antKey').value.trim();

    });

    const displayReply=rawReply.replace(/TRADE::(LONG|SHORT|NONE)[^\n]*/g,'').trim();
    S.chatHistory.push({role:'assistant',content:rawReply});
    if(S.chatHistory.length>30)S.chatHistory=S.chatHistory.slice(-30);

// ── SMART SYNC + AUTO ANALYSIS ────────────────────────────────────────────────
function startSync(){
  clearInterval(S.syncTick);
  let ticks=0;
  S.syncTick=setInterval(async()=>{
    if(!S.running)return;
    ticks++;
    // 1M every 30s
    try{
      const sym=getSymbol();
      const c=await fetchTD(sym,'1min',60);
      S.candles.M1=c;S.series.M1.setData(c);
      S.charts.M1.timeScale().fitContent();setMeta('meta-M1',c);
    }catch(e){}
    // 5M + 15M every 90s (every 3rd tick)
    if(ticks%3===0){
      try{
        const sym=getSymbol();
        const c5=await fetchTD(sym,'5min',100);
        S.candles.M5=c5;S.series.M5.setData(c5);
        S.charts.M5.timeScale().fitContent();setMeta('meta-M5',c5);
        await new Promise(r=>setTimeout(r,350));
        const c15=await fetchTD(sym,'15min',100);
        S.candles.M15=c15;S.series.M15.setData(c15);
        S.charts.M15.timeScale().fitContent();setMeta('meta-M15',c15);
      }catch(e){}
    }
    // auto-analysis every 5 ticks = 5 minutes
    if(ticks%5===0){
      runAnalysis(true);
    }
  },60000); // 60s — saves API credits (free tier = 8 req/min)
}

// ── SESSION ───────────────────────────────────────────────────────────────────
async function startSession(){
  if(!document.getElementById('tdKey').value.trim()){alert('Enter Twelve Data key.\nFree at twelvedata.com');return;}
  if(!document.getElementById('antKey').value.trim()){alert('Enter Anthropic key.');return;}
  localStorage.setItem(`apex_td_${apexUser}`,document.getElementById('tdKey').value.trim());
  localStorage.setItem(`apex_ant_${apexUser}`,document.getElementById('antKey').value.trim());
  S.running=true;
  document.getElementById('startBtn').style.display='none';
  document.getElementById('stopBtn').style.display='';
  document.getElementById('liveDot').className='dot live';
  document.getElementById('liveLabel').textContent='LIVE';
  document.getElementById('liveTag').style.display='';
  // wait two frames so DOM has correct dimensions before chart init
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  initCharts();
  // another frame after chart init
  await new Promise(r=>setTimeout(r,100));
  log('Loading data…','ok');
  await fetchAll();
  setAgentStatus('watching');
  document.getElementById('chatSend').disabled=false;
  startSync();
  log('Starting analysis…','ok');
  await runAnalysis(false);
}

function stopSession(){
  S.running=false;
  clearInterval(S.syncTick);
  clearInterval(S.tickerTick);
  if(tickerRAF)cancelAnimationFrame(tickerRAF);
  document.getElementById('startBtn').style.display='';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('liveDot').className='dot off';
  document.getElementById('liveLabel').textContent='OFFLINE';
  document.getElementById('liveTag').style.display='none';
  document.getElementById('analyzeBtn').disabled=true;
  document.getElementById('chatSend').disabled=true;
  setAgentStatus('offline');
  log('Session stopped','warn');
}
</script>
