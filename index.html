<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TXYZ — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf9;--s1:#ffffff;--s2:#f5f5f4;--border:#e5e3e0;
  --accent:#a89968;--text:#1a1a1a;--muted:#8a8a85;
  --bull:#2a2a2a;--bear:#7a7a78;--gold:#a89968;
  --mono:'Space Mono',monospace;--display:'Syne',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(168,153,104,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(168,153,104,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* GLOW ORB */
body::after{content:'';position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(168,153,104,.06) 0%,transparent 70%);pointer-events:none;z-index:0}

.container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0}

/* LOGO */
.logo-wrap{text-align:center;margin-bottom:40px}
.logo{font-family:var(--display);font-weight:800;font-size:2.8rem;color:#fff;letter-spacing:-.03em;line-height:1}
.logo em{color:var(--accent);font-style:normal}
.logo-sub{font-size:.6rem;letter-spacing:.25em;color:var(--muted);margin-top:8px}

/* CARD */
.card{background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:36px 40px;width:100%;max-width:380px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5}

.card-title{font-size:.55rem;letter-spacing:.2em;color:var(--muted);margin-bottom:28px;text-align:center}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-size:.52rem;letter-spacing:.12em;color:var(--muted)}
.field input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.8rem;padding:10px 14px;border-radius:3px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(168,153,104,.08)}
.field input::placeholder{color:var(--muted)}

.login-btn{width:100%;background:linear-gradient(135deg,rgba(168,153,104,.2),rgba(168,153,104,.08));border:1px solid var(--accent);color:var(--accent);font-family:var(--mono);font-size:.65rem;font-weight:700;letter-spacing:.15em;padding:13px;border-radius:3px;cursor:pointer;margin-top:8px;transition:all .2s;position:relative;overflow:hidden}
.login-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);transform:translateX(-100%);transition:transform .4s}
.login-btn:hover{background:linear-gradient(135deg,rgba(168,153,104,.3),rgba(168,153,104,.15));box-shadow:0 0 20px rgba(168,153,104,.2)}
.login-btn:hover::after{transform:translateX(100%)}
.login-btn:active{transform:scale(.99)}

.error-msg{background:rgba(122,122,120,.08);border:1px solid rgba(122,122,120,.25);border-radius:3px;padding:10px 14px;font-size:.62rem;color:#ff7a8a;margin-top:12px;text-align:center;display:none}

/* WELCOME SCREEN */
.welcome{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.welcome-logo{font-family:var(--display);font-weight:800;font-size:3rem;color:#fff;letter-spacing:-.03em}
.welcome-logo em{color:var(--accent);font-style:normal}
.welcome-text{font-size:1rem;letter-spacing:.15em;color:var(--muted)}
.welcome-name{font-family:var(--display);font-weight:700;font-size:2rem;color:var(--accent);letter-spacing:-.01em}
.welcome-bar{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-top:8px}
.welcome-fill{height:100%;width:0%;background:var(--accent);border-radius:1px;transition:width 2s ease}

/* SCANLINES */
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.015) 2px,rgba(0,0,0,.015) 4px);pointer-events:none;z-index:200}
</style>
</head>
<body>

<div class="scanlines"></div>

<!-- WELCOME OVERLAY -->
<div class="welcome" id="welcomeScreen">
  <div class="welcome-logo">TXYZ</div>
  <div class="welcome-text">WELCOME BACK</div>
  <div class="welcome-name" id="welcomeName"></div>
  <div class="welcome-bar"><div class="welcome-fill" id="welcomeFill"></div></div>
</div>

<div class="container">
  <div class="logo-wrap">
    <div class="logo">TXYZ</div>
    <div class="logo-sub">SCALP TRADING PLATFORM</div>
  </div>

  <div class="card">
    <div class="card-title">SIGN IN TO YOUR ACCOUNT</div>
    <div class="field">
      <label>USERNAME</label>
      <input type="text" id="username" placeholder="enter username" autocomplete="off" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="login-btn" onclick="login()">▶ ACCESS PLATFORM</button>
    <div class="error-msg" id="errorMsg">Invalid username or password</div>
  </div>
</div>

<script>
// ── USERS — edit here to add/change users ────────────────────────────────────
const USERS = {
  'thomas':  'password123',
  'alex':    '1234',
};
// ─────────────────────────────────────────────────────────────────────────────

function login(){
  const user=document.getElementById('username').value.trim().toLowerCase();
  const pass=document.getElementById('password').value;
  const err=document.getElementById('errorMsg');

  if(USERS[user]&&USERS[user]===pass){
    err.style.display='none';
    showWelcome(user);
  } else {
    err.style.display='block';
    document.getElementById('password').value='';
    document.getElementById('password').focus();
  }
}

function showWelcome(user){
  const displayName=user.charAt(0).toUpperCase()+user.slice(1);
  const ws=document.getElementById('welcomeScreen');
  document.getElementById('welcomeName').textContent=displayName;
  ws.style.display='flex';
  // trigger bar animation
  setTimeout(()=>{
    document.getElementById('welcomeFill').style.width='100%';
  },100);
  // store session and redirect after 2.5s
  sessionStorage.setItem('apex_user',displayName);
  setTimeout(()=>{
    window.location.href='app.html';
  },2500);
}

// auto focus
document.getElementById('username').focus();
</script>
</body>
</html>
